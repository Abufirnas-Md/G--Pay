<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPay Payment Page</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Simple Money Transfer</h1>

        <button id="gpayBtn">Pay by GPay</button>

        <div id="qrSection" class="hidden">
            <h3>Scan & Pay</h3>
            <img id="gpayImage" src="gpay-logo.png" alt="GPay Logo" />
            <p>Click the image to view QR</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
